services:

  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Django Backend ───────────────────────────────────────────
  backend:
    build: ./Resumate
    restart: unless-stopped
    volumes:
      - ./Resumate:/app          # 熱重載：程式碼異動自動反映
      - media_files:/app/media   # 上傳的檔案（履歷 PDF）持久化
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY:          ${SECRET_KEY}
      DEBUG:               ${DEBUG:-True}
      GOOGLE_API_KEY:      ${GOOGLE_API_KEY}
      DB_NAME:             ${DB_NAME}
      DB_USER:             ${DB_USER}
      DB_PASSWORD:         ${DB_PASSWORD}
      DB_HOST:             db      # 覆蓋 .env 的 localhost → Docker service name
      DB_PORT:             5432
      EMAIL_HOST:          ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT:          ${EMAIL_PORT:-587}
      EMAIL_HOST_USER:     ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL:  ${DEFAULT_FROM_EMAIL}
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend ───────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src         # 熱重載：src 異動立即反映
      - ./frontend/public:/app/public
      - /app/node_modules               # 保留容器內的 node_modules，不被 host 覆蓋
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_files:
